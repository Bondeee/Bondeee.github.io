<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tabella studenti</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body { padding: 20px; background-color: #f4f7f6; }
            .container { max-width: 900px; }
            .header-nav { margin-bottom: 20px; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header-nav">
                <a href="../progetti.html" class="btn btn-outline-secondary btn-sm">← Progetti</a>
            </div>

            <h2 class="mb-4">Gestione Elenco Studenti</h2>

            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-4">Aggiungi Nuovo Studente</h5>
                    <div class="row g-3 align-items-center">
                        <div class="col-lg-3 col-md-4">
                            <input type="text" id="nome" class="form-control" placeholder="Nome">
                        </div>
                        <div class="col-lg-3 col-md-4">
                            <input type="text" id="cognome" class="form-control" placeholder="Cognome">
                        </div>
                        <div class="col-lg-2 col-md-2">
                            <input type="number" id="eta" class="form-control" placeholder="Età">
                        </div>
                        <div class="col-lg-2 col-md-2 d-grid">
                            <button onclick="aggiungiStudente()" class="btn btn-success">Aggiungi</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Nome</th>
                                <th>Cognome</th>
                                <th>Età</th>
                                <th class="text-center">Azione</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabella">
                            </tbody>
                    </table>
                </div>
            </div> 
        </div>

        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
